# Nom affiché dans GitHub Actions
name: CI/CD Pipeline
# Trigger : ce qui déclenche le workflow
on:
  push:
    branches:
      - master


jobs:
  build-and-push:
    # Machine virtuelle founnie par GitHub
    runs-on: ubuntu-latest

    steps:
      # Étape 1 : Récupérer le code sur runner
      - name: Checkout code
        uses: actions/checkout@v4

      # Étape 2 : Configurer et se connecter à Docker Buildx
      - name: Set up Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      
      # Étape 3 : Construire et pousser les images Docker
      - name: Build and push Docker images
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: user/app:latest
            
